function teamOptionsHtml(selectedCode) {
  let html = `<option value="" ${!selectedCode ? 'selected' : ''}>— Elegí un equipo —</option>`;
  html += `<optgroup label="FWC — Especiales">`;
  for (const code of Object.keys(SEED.fwcLabels)) {
    html += `<option value="${code}" ${selectedCode === code ? 'selected' : ''}>${SEED.fwcSubtypeLabel[code] || SEED.fwcLabels[code]}</option>`;
  }
  html += `</optgroup><optgroup label="Selecciones">`;
  const countries = Object.keys(SEED.teamNames)
    .filter(c => c !== 'FWC')
    .sort((a, b) => SEED.teamNames[a].localeCompare(SEED.teamNames[b], 'es'));
  for (const code of countries) {
    html += `<option value="${code}" ${selectedCode === code ? 'selected' : ''}>${SEED.teamNames[code]} (${code})</option>`;
  }
  html += `</optgroup>`;
  return html;
}
function numberGridHtml(code, activeNums, makeOnclick) {
  if (!code) return `<p class="picker-hint">Elegí un equipo arriba para ver sus números.</p>`;
  const isFwc = code.startsWith('FWC');
  const fwcRange = SEED.fwcRanges[code];
  const start = isFwc ? (fwcRange ? fwcRange[0] : 0) : 1;
  const end = isFwc ? (fwcRange ? fwcRange[1] : 19) : 20;
  let html = '<div class="num-grid">';
  for (let n = start; n <= end; n++) {
    const active = activeNums.has(n);
    const label = isFwc ? String(n).padStart(2, '0') : String(n);
    html += `<button type="button" class="num-btn ${active ? 'active' : ''}" onclick="${makeOnclick(n)}">${label}</button>`;
  }
  html += '</div>';
  return html;
}
function collapseButtonHtml(code, onclickCall) {
  return code ? `<button type="button" class="picker-save-btn" onclick="${onclickCall}">✓ Guardar</button>` : '';
}

function toggleTengoNum(code, num) {
  if (!state.tengo[code]) state.tengo[code] = {};
  const key = String(num);
  if (state.tengo[code][key]) {
    delete state.tengo[code][key];
    if (Object.keys(state.tengo[code]).length === 0) delete state.tengo[code];
  } else {
    const qty = parseInt(document.getElementById('tengoPickQty')?.value, 10) || 1;
    state.tengo[code][key] = qty;
  }
  saveDbState();
  renderAll();
}
function removeTengo(code, num) {
  delete state.tengo[code][String(num)];
  if (Object.keys(state.tengo[code]).length === 0) delete state.tengo[code];
  saveDbState();
  renderAll();
}
// El input de cantidad en Mi Inventario muestra/edita lo DISPONIBLE ahora
// mismo (ya descontando lo entregado en tratos completados), no el crudo
// histórico. Se traduce de vuelta sumando lo ya entregado, para no perder
// esos tratos completados (el motor de emparejamiento necesita que el
// crudo siga siendo > 0 mientras haya un trato hecho con ese sticker).
// Llegar a 0 disponibles NO borra el sticker — se guarda en 0 y queda
// agrupado en "Sin stock", visible pero fuera de nuevos intercambios.
function updateTengoQty(code, num, availableQty) {
  availableQty = parseInt(availableQty, 10);
  if (isNaN(availableQty) || availableQty < 0) availableQty = 0;
  const given = usedCountFor(stickerDisplay(code, num), '');
  state.tengo[code][String(num)] = availableQty + given;
  saveDbState();
  renderAll();
}

// Edita en la base de datos global si un sticker es un "jugador destacado"
// (valor especial). Esto cambia su categoría en TODOS los intercambios donde
// aparezca — para un ajuste puntual dentro de un solo trato, usar el botón
// ⚖️ en la pestaña Intercambios en su lugar.
function editPremium(code, num) {
  const key = `${code} ${num}`;
  const current = state.premium[key] || '';
  const input = prompt(
    `${stickerDisplay(code, num)} — ${current ? `Actualmente es un jugador destacado: "${current}".` : 'Actualmente es un sticker normal.'}\n\nEscribí el nombre del jugador para marcarlo como destacado (valor especial), o dejá vacío para que sea un sticker normal:`,
    current
  );
  if (input === null) return;
  const trimmed = input.trim();
  if (trimmed) state.premium[key] = trimmed; else delete state.premium[key];
  saveDbState();
  renderAll();
}
function toggleNecesitoNum(code, num) {
  if (!state.necesito[code]) state.necesito[code] = [];
  const idx = state.necesito[code].indexOf(num);
  if (idx >= 0) {
    state.necesito[code].splice(idx, 1);
    if (state.necesito[code].length === 0) delete state.necesito[code];
  } else {
    state.necesito[code].push(num);
  }
  saveDbState();
  renderAll();
}
function removeNecesito(code, num) {
  state.necesito[code] = state.necesito[code].filter(n => n !== num);
  if (state.necesito[code].length === 0) delete state.necesito[code];
  saveDbState();
  renderAll();
}

function renderDbInventario() {
  const el = document.getElementById('db-inventario');
  if (!el) return;
  const tengoCount = Object.values(state.tengo).reduce((a, o) => a + Object.keys(o).length, 0);
  const necesitoCount = Object.values(state.necesito).reduce((a, arr) => a + arr.length, 0);
  el.innerHTML = `
    <div class="db-section">
      <div class="db-section-title-row">
        <h2>Tengo para intercambiar <span style="color:var(--muted);font-size:13px">(${tengoCount})</span></h2>
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          <select class="db-filter-select" title="Orden del resumen a copiar" onchange="onTengoSummarySortChange(this)">${tengoSummarySortOptionsHtml()}</select>
          <button type="button" class="db-export-btn" title="Copiar en texto todo lo que tenés disponible para intercambiar, con la cantidad de cada sticker" onclick="exportTengoSummary()">📋 Copiar resumen</button>
        </div>
      </div>
      <p class="db-sub">Stickers que tienes disponibles para dar. Elegí el equipo y tocá los números que tenés — tocá de nuevo para quitarlos.</p>
      <div class="team-picker">
        <div class="team-picker-row">
          <select class="team-select" onchange="pickerTengo=this.value; renderDbInventario();">${teamOptionsHtml(pickerTengo)}</select>
          <input type="number" class="qty" id="tengoPickQty" min="1" value="1" placeholder="Cant." title="Cantidad para stickers nuevos" />
        </div>
        ${numberGridHtml(pickerTengo, new Set(Object.keys(state.tengo[pickerTengo] || {}).map(Number)), n => `toggleTengoNum('${pickerTengo}',${n})`)}
        ${collapseButtonHtml(pickerTengo, 'collapseTengoPicker()')}
      </div>
      <input class="db-filter" placeholder="Buscar (ej: ARG, Holograma, Messi)..." oninput="onTengoFilterInput(this)" value="${tengoFilter}" />
      <div class="db-filter-row">
        <select class="db-filter-select" onchange="onTengoCountryFilter(this)">${countryFilterOptionsHtml(tengoCountryFilter)}</select>
        <select class="db-filter-select" onchange="onTengoTypeFilter(this)">${typeFilterOptionsHtml(tengoTypeFilter)}</select>
        <input type="number" class="db-filter-qty" min="1" placeholder="Mín. copias" title="Mostrar solo stickers con al menos esta cantidad (útil para encontrar duplicados)" value="${tengoMinQtyFilter}" onchange="onTengoMinQtyFilter(this)" />
      </div>
      <div id="tengoSubtotal">${buildTengoSubtotalHtml()}</div>
      <div class="db-list" id="tengoListContainer">${buildTengoListHtml()}</div>
    </div>
    <div class="db-section">
      <h2>Necesito <span style="color:var(--muted);font-size:13px">(${necesitoCount})</span></h2>
      <p class="db-sub">Stickers que te faltan para completar el álbum. Tocá un número para marcarlo, tocá de nuevo para quitarlo.</p>
      <div class="team-picker">
        <div class="team-picker-row">
          <select class="team-select" onchange="pickerNecesito=this.value; renderDbInventario();">${teamOptionsHtml(pickerNecesito)}</select>
        </div>
        ${numberGridHtml(pickerNecesito, new Set(state.necesito[pickerNecesito] || []), n => `toggleNecesitoNum('${pickerNecesito}',${n})`)}
        ${collapseButtonHtml(pickerNecesito, 'collapseNecesitoPicker()')}
      </div>
      <input class="db-filter" placeholder="Buscar..." oninput="onNecesitoFilterInput(this)" value="${necesitoFilter}" />
      <div class="db-filter-row">
        <select class="db-filter-select" onchange="onNecesitoCountryFilter(this)">${countryFilterOptionsHtml(necesitoCountryFilter)}</select>
        <select class="db-filter-select" onchange="onNecesitoTypeFilter(this)">${typeFilterOptionsHtml(necesitoTypeFilter)}</select>
      </div>
      <div id="necesitoSubtotal">${buildNecesitoSubtotalHtml()}</div>
      <div class="db-list" id="necesitoListContainer">${buildNecesitoListHtml()}</div>
    </div>`;
}

// ============================================================================
// RENDER — BASE DE DATOS: PERSONAS
// ============================================================================
function togglePersonOpen(name) {
  openPersonName = (openPersonName === name) ? null : name;
  renderDbPersonas();
}
function createNewPerson() {
  const name = document.getElementById('newPersonName').value.trim();
  const location = document.getElementById('newPersonLocation').value.trim();
  if (!name) { alert('Escribe un nombre'); return; }
  if (state.people[name]) { alert('Ya existe una persona con ese nombre'); return; }
  state.people[name] = { location, meetPoint: 'Por definir', notas: '', conflicto: null, specialDeal: null, have: {}, need: {} };
  document.getElementById('newPersonName').value = '';
  document.getElementById('newPersonLocation').value = '';
  openPersonName = name;
  saveDbState();
  renderAll();
}
function removePerson(name) {
  if (!confirm(`¿Eliminar a ${name}? Esto borra su lista de tengo/necesito y su progreso de intercambio guardado.`)) return;
  delete state.people[name];
  for (const id of Object.keys(swaps)) if (id.startsWith(name + '::')) delete swaps[id];
  for (const id of Object.keys(doySwaps)) if (id.startsWith(name + '::')) delete doySwaps[id];
  delete manualPairs[name];
  delete removedAutoPairs[name];
  delete rowOrder[name];
  delete meetInfo[name];
  [...checked].forEach(id => { if (id.startsWith(name + '::')) checked.delete(id); });
  if (openPersonName === name) openPersonName = null;
  saveDbState();
  saveTrackingState();
  renderAll();
}
function updatePersonField(name, field, value) {
  state.people[name][field] = value;
  saveDbState();
}
function togglePersonHaveNum(name, code, num) {
  const p = state.people[name];
  if (!p.have[code]) p.have[code] = {};
  const key = String(num);
  if (p.have[code][key]) {
    delete p.have[code][key];
    if (Object.keys(p.have[code]).length === 0) delete p.have[code];
  } else {
    const qty = parseInt(document.getElementById(`havePickQty-${cssId(name)}`)?.value, 10) || 1;
    p.have[code][key] = qty;
  }
  saveDbState();
  renderAll();
}
function removePersonHave(name, code, num) {
  delete state.people[name].have[code][String(num)];
  if (Object.keys(state.people[name].have[code]).length === 0) delete state.people[name].have[code];
  saveDbState();
  renderAll();
}
function togglePersonNeedNum(name, code, num) {
  const p = state.people[name];
  if (!p.need[code]) p.need[code] = [];
  const idx = p.need[code].indexOf(num);
  if (idx >= 0) {
    p.need[code].splice(idx, 1);
    if (p.need[code].length === 0) delete p.need[code];
  } else {
    p.need[code].push(num);
  }
  saveDbState();
  renderAll();
}
function removePersonNeed(name, code, num) {
  state.people[name].need[code] = state.people[name].need[code].filter(n => n !== num);
  if (state.people[name].need[code].length === 0) delete state.people[name].need[code];
  saveDbState();
  renderAll();
}
function cssId(name) {
  return name.replace(/[^a-zA-Z0-9]/g, '_');
}

function renderDbPersonas() {
  const el = document.getElementById('db-personas');
  if (!el) return;
  let html = `<div class="new-person-form">
    <input id="newPersonName" placeholder="Nombre de la nueva persona" />
    <input id="newPersonLocation" placeholder="Ubicación (opcional)" />
    <button onclick="createNewPerson()">+ Nueva Persona</button>
  </div>`;

  const names = Object.keys(state.people);
  if (names.length === 0) html += '<div class="db-empty">Todavía no has agregado a nadie.</div>';

  for (const name of names) {
    const p = state.people[name];
    const haveCount = Object.values(p.have).reduce((a, o) => a + Object.keys(o).length, 0);
    const needCount = Object.values(p.need).reduce((a, arr) => a + arr.length, 0);
    const isOpen = openPersonName === name;
    const cid = cssId(name);
    const escName = name.replace(/'/g, "\\'");

    let haveRows = [];
    for (const code in p.have) for (const numStr in p.have[code]) haveRows.push({ code, num: parseInt(numStr, 10), qty: p.have[code][numStr] });
    haveRows.sort((a, b) => (a.code + a.num).localeCompare(b.code + b.num));
    let needRows = [];
    for (const code in p.need) for (const num of p.need[code]) needRows.push({ code, num });
    needRows.sort((a, b) => (a.code + a.num).localeCompare(b.code + b.num));

    html += `<div class="person-manage-card" id="person-manage-${cid}">
      <div class="person-manage-head">
        <div class="info"><div class="name">${name}</div><div class="count">${p.location || '(sin ubicación)'} · Tiene ${haveCount} · Necesita ${needCount}</div></div>
        <div class="person-manage-actions">
          <button class="edit" onclick="togglePersonOpen('${name.replace(/'/g, "\\'")}')">${isOpen ? 'Cerrar' : 'Editar'}</button>
          <button class="del" onclick="removePerson('${name.replace(/'/g, "\\'")}')">Eliminar</button>
        </div>
      </div>
      <div class="person-manage-body ${isOpen ? 'open' : ''}">
        <div class="person-fields">
          <input placeholder="Ubicación" value="${(p.location || '').replace(/"/g, '&quot;')}" onchange="updatePersonField('${name.replace(/'/g, "\\'")}','location',this.value)" />
          <input placeholder="Punto de encuentro" value="${(p.meetPoint || '').replace(/"/g, '&quot;')}" onchange="updatePersonField('${name.replace(/'/g, "\\'")}','meetPoint',this.value)" />
          <input placeholder="Notas" value="${(p.notas || '').replace(/"/g, '&quot;')}" onchange="updatePersonField('${name.replace(/'/g, "\\'")}','notas',this.value)" />
        </div>
        <div class="person-two-col">
          <div>
            <h3>Tiene para intercambiar (${haveCount})</h3>
            <div class="team-picker">
              <div class="team-picker-row">
                <select class="team-select" onchange="pickerPersonHave['${escName}']=this.value; renderDbPersonas();">${teamOptionsHtml(pickerPersonHave[name])}</select>
                <input type="number" class="qty" id="havePickQty-${cid}" min="1" value="1" placeholder="Cant." />
              </div>
              ${numberGridHtml(pickerPersonHave[name], new Set(Object.keys(p.have[pickerPersonHave[name]] || {}).map(Number)), n => `togglePersonHaveNum('${escName}','${pickerPersonHave[name]}',${n})`)}
              ${collapseButtonHtml(pickerPersonHave[name], `collapsePersonHavePicker('${escName}')`)}
            </div>
            <div class="db-list" id="haveList-${cid}">${haveRows.length ? haveRows.map(r => {
              const received = personReceivedCount(name, stickerDisplay(r.code, r.num));
              const note = received > 0 ? ` <span class="db-live-note">✅ Ya te lo dio</span>` : '';
              return `<div class="db-row"><span class="code">${stickerDisplay(r.code, r.num)}</span><span class="label">${categoryLabelOf(r.code, r.num)} ${r.qty > 1 ? `x${r.qty}` : ''}${note}</span><button class="del" onclick="removePersonHave('${escName}','${r.code}',${r.num})">✕</button></div>`;
            }).join('') : '<div class="db-empty">Sin datos</div>'}</div>
          </div>
          <div>
            <h3>Necesita (${needCount})</h3>
            <div class="team-picker">
              <div class="team-picker-row">
                <select class="team-select" onchange="pickerPersonNeed['${escName}']=this.value; renderDbPersonas();">${teamOptionsHtml(pickerPersonNeed[name])}</select>
              </div>
              ${numberGridHtml(pickerPersonNeed[name], new Set(p.need[pickerPersonNeed[name]] || []), n => `togglePersonNeedNum('${escName}','${pickerPersonNeed[name]}',${n})`)}
              ${collapseButtonHtml(pickerPersonNeed[name], `collapsePersonNeedPicker('${escName}')`)}
            </div>
            <div class="db-list" id="needList-${cid}">${needRows.length ? needRows.map(r => {
              const given = personGivenCount(name, stickerDisplay(r.code, r.num));
              const note = given > 0 ? ` <span class="db-live-note">✅ Ya se lo diste</span>` : '';
              return `<div class="db-row"><span class="code">${stickerDisplay(r.code, r.num)}</span><span class="label">${categoryLabelOf(r.code, r.num)}${note}</span><button class="del" onclick="removePersonNeed('${escName}','${r.code}',${r.num})">✕</button></div>`;
            }).join('') : '<div class="db-empty">Sin datos</div>'}</div>
          </div>
        </div>
      </div>
    </div>`;
  }
  el.innerHTML = html;
}

// ============================================================================
// RENDER — BASE DE DATOS: VENTAS
// ============================================================================
function createSaleBuyer() {
  const name = document.getElementById('newBuyerName').value.trim();
  const location = document.getElementById('newBuyerLocation').value.trim();
  if (!name) { alert('Escribe un nombre'); return; }
  if (state.sales.find(s => s.buyer === name)) { alert('Ya existe ese comprador'); return; }
  state.sales.push({ buyer: name, location, meetPoint: location, need: {}, precioAlto: [] });
  document.getElementById('newBuyerName').value = '';
  document.getElementById('newBuyerLocation').value = '';
  saveDbState();
  renderAll();
}
function removeSaleBuyer(name) {
  if (!confirm(`¿Eliminar comprador ${name}?`)) return;
  state.sales = state.sales.filter(s => s.buyer !== name);
  saveDbState();
  renderAll();
}
function toggleSaleNeedNum(buyer, code, num) {
  const sale = state.sales.find(s => s.buyer === buyer);
  if (!sale.need[code]) sale.need[code] = [];
  const idx = sale.need[code].indexOf(num);
  if (idx >= 0) {
    sale.need[code].splice(idx, 1);
    if (sale.need[code].length === 0) delete sale.need[code];
  } else {
    sale.need[code].push(num);
  }
  saveDbState();
  renderAll();
}

// Los datos ya se guardan al tocar cada número; "Guardar" solo colapsa el
// picker de vuelta al selector, para no dejar la grilla abierta todo el tiempo.
function collapseTengoPicker() { pickerTengo = ''; renderDbInventario(); }
function collapseNecesitoPicker() { pickerNecesito = ''; renderDbInventario(); }
function collapsePersonHavePicker(name) { delete pickerPersonHave[name]; renderDbPersonas(); }
function collapsePersonNeedPicker(name) { delete pickerPersonNeed[name]; renderDbPersonas(); }
function collapseSaleNeedPicker(buyer) { delete pickerSaleNeed[buyer]; renderDbVentas(); }

function removeSaleNeed(buyer, code, num) {
  const sale = state.sales.find(s => s.buyer === buyer);
  sale.need[code] = sale.need[code].filter(n => n !== num);
  if (sale.need[code].length === 0) delete sale.need[code];
  saveDbState();
  renderAll();
}
function toggleSaleAltoPrice(buyer, code, num) {
  const sale = state.sales.find(s => s.buyer === buyer);
  const idx = (sale.precioAlto || []).findIndex(([c, n]) => c === code && n === num);
  if (!sale.precioAlto) sale.precioAlto = [];
  if (idx >= 0) sale.precioAlto.splice(idx, 1); else sale.precioAlto.push([code, num]);
  saveDbState();
  renderAll();
}

function renderDbVentas() {
  const el = document.getElementById('db-ventas');
  if (!el) return;
  const { totalSales, doneSales } = computeSummary();
  let html = `<div class="summary-bar" style="margin-bottom:16px">
    <div class="pill" style="background:var(--pitch);color:var(--paper)">$ <b>${doneSales}</b>/${totalSales} ventas hechas</div>
  </div>
  <div class="db-section">
    <p class="db-sub">Personas que ya no tienen nada para intercambiar y sólo quieren COMPRAR stickers tuyos.</p>
    <div class="new-person-form">
      <input id="newBuyerName" placeholder="Nombre del comprador" />
      <input id="newBuyerLocation" placeholder="Ubicación (opcional)" />
      <button onclick="createSaleBuyer()">+ Nuevo Comprador</button>
    </div>
  </div>`;

  if (state.sales.length === 0) html += '<div class="db-empty">Sin compradores todavía.</div>';

  for (const sale of state.sales) {
    const escBuyer = sale.buyer.replace(/'/g, "\\'");
    const buyerKey = `Venta::${sale.buyer}`;
    let needRows = [];
    for (const code in sale.need) for (const num of sale.need[code]) needRows.push({ code, num });
    needRows.sort((a, b) => (a.code + a.num).localeCompare(b.code + b.num));
    const matches = computeSaleMatches(sale.buyer);
    const doneCount = matches.filter(item => checked.has(`${sale.buyer}::sale::${stickerDisplay(item.code, item.num)}`)).length;

    const meet = meetInfo[buyerKey] || {};
    const meetPlace = meet.place !== undefined ? meet.place : sale.location;
    const meetDate = meet.date || '';
    const meetTime = meet.time || '';

    html += `<div class="person-manage-card">
      <div class="person-manage-head">
        <div class="info"><div class="name">${sale.buyer}</div><div class="count">${sale.location || '(sin ubicación)'} · ${doneCount}/${matches.length} vendidos</div></div>
        <div class="person-manage-actions"><button class="del" onclick="removeSaleBuyer('${escBuyer}')">Eliminar</button></div>
      </div>
      <div class="person-manage-body open">
        <div class="meet-edit-row" style="margin-bottom:14px">
          <div class="meet-field" style="color:var(--ink)"><label style="color:var(--muted)">Fecha</label><input type="date" style="background:#fff;border-color:var(--paper-line);color:var(--ink)" data-person="${buyerKey}" value="${meetDate}" onchange="updateMeet(this,'date')" />${!meetDate ? '<span class="meet-undefined">Sin definir</span>' : ''}</div>
          <div class="meet-field" style="color:var(--ink)"><label style="color:var(--muted)">Hora</label><input type="time" style="background:#fff;border-color:var(--paper-line);color:var(--ink)" data-person="${buyerKey}" value="${meetTime}" onchange="updateMeet(this,'time')" /></div>
          <div class="meet-field place" style="color:var(--ink)"><label style="color:var(--muted)">Lugar</label><input type="text" style="background:#fff;border-color:var(--paper-line);color:var(--ink)" placeholder="Lugar de encuentro" data-person="${buyerKey}" value="${(meetPlace || '').replace(/"/g, '&quot;')}" onchange="updateMeet(this,'place')" /></div>
        </div>
        ${matches.length ? `<h3 style="font-family:'Barlow Condensed',sans-serif;font-size:15px;margin:0 0 6px;color:var(--pitch-dark)">Disponibles para vender ahora (${doneCount}/${matches.length})</h3>
        <div class="db-list" id="saleMatchesList-${cssId(sale.buyer)}" style="margin-bottom:14px">${matches.map(item => renderSaleRow(sale.buyer, item)).join('')}</div>` : ''}
        <div class="team-picker">
          <div class="team-picker-row">
            <select class="team-select" onchange="pickerSaleNeed['${escBuyer}']=this.value; renderDbVentas();">${teamOptionsHtml(pickerSaleNeed[sale.buyer])}</select>
          </div>
          ${numberGridHtml(pickerSaleNeed[sale.buyer], new Set(sale.need[pickerSaleNeed[sale.buyer]] || []), n => `toggleSaleNeedNum('${escBuyer}','${pickerSaleNeed[sale.buyer]}',${n})`)}
          ${collapseButtonHtml(pickerSaleNeed[sale.buyer], `collapseSaleNeedPicker('${escBuyer}')`)}
        </div>
        <div class="db-list" id="saleNeedList-${cssId(sale.buyer)}">${needRows.length ? needRows.map(r => {
          const isAlto = (sale.precioAlto || []).some(([c, n]) => c === r.code && n === r.num);
          const has = tengoQty(r.code, r.num) > 0;
          return `<div class="db-row">
            <span class="code">${stickerDisplay(r.code, r.num)}</span>
            <span class="label">${categoryLabelOf(r.code, r.num)} ${has ? '✅ lo tienes' : '— no lo tienes'}</span>
            <label style="font-size:10.5px;display:flex;align-items:center;gap:3px;"><input type="checkbox" ${isAlto ? 'checked' : ''} onchange="toggleSaleAltoPrice('${sale.buyer.replace(/'/g, "\\'")}','${r.code}',${r.num})" /> Precio alto</label>
            <button class="del" onclick="removeSaleNeed('${sale.buyer.replace(/'/g, "\\'")}','${r.code}',${r.num})">✕</button>
          </div>`;
        }).join('') : '<div class="db-empty">Sin datos</div>'}</div>
      </div>
    </div>`;
  }
  el.innerHTML = html;
}

// ============================================================================
// INIT
// ============================================================================
document.getElementById('resetBtn').addEventListener('click', async () => {
  if (confirm('¿Reiniciar todo el progreso de intercambios? Esto desmarca todo, deshace cambios de sticker y borra fecha/lugar/hora. NO borra tu base de datos (Tengo/Necesito/Personas) ni los intercambios agregados a mano.')) {
    checked = new Set();
    swaps = {};
    doySwaps = {};
    meetInfo = {};
    removedAutoPairs = {};
    await saveTrackingState();
    renderAll();
  }
});

loadAll();

</script>
