    <button onclick="createNewPerson()">+ Nueva Persona</button>
  </div>`;

  const names = Object.keys(state.people);
  if (names.length === 0) html += '<div class="db-empty">Todavía no has agregado a nadie.</div>';

  for (const name of names) {
    const p = state.people[name];
    const haveCount = Object.values(p.have).reduce((a, o) => a + Object.keys(o).length, 0);
    const needCount = Object.values(p.need).reduce((a, arr) => a + arr.length, 0);
    const isOpen = openPersonName === name;
    const cid = cssId(name);
    const escName = name.replace(/'/g, "\\'");

    let haveRows = [];
    for (const code in p.have) for (const numStr in p.have[code]) haveRows.push({ code, num: parseInt(numStr, 10), qty: p.have[code][numStr] });
    haveRows.sort((a, b) => (a.code + a.num).localeCompare(b.code + b.num));
    let needRows = [];
    for (const code in p.need) for (const num of p.need[code]) needRows.push({ code, num });
    needRows.sort((a, b) => (a.code + a.num).localeCompare(b.code + b.num));

    html += `<div class="person-manage-card" id="person-manage-${cid}">
      <div class="person-manage-head">
        <div class="info"><div class="name">${name}</div><div class="count">${p.location || '(sin ubicación)'} · Tiene ${haveCount} · Necesita ${needCount}</div></div>
        <div class="person-manage-actions">
          <button class="edit" onclick="togglePersonOpen('${name.replace(/'/g, "\\'")}')">${isOpen ? 'Cerrar' : 'Editar'}</button>
          <button class="del" onclick="removePerson('${name.replace(/'/g, "\\'")}')">Eliminar</button>
        </div>
      </div>
      <div class="person-manage-body ${isOpen ? 'open' : ''}">
        <div class="person-fields">
          <input placeholder="Ubicación" value="${(p.location || '').replace(/"/g, '&quot;')}" onchange="updatePersonField('${name.replace(/'/g, "\\'")}','location',this.value)" />
          <input placeholder="Punto de encuentro" value="${(p.meetPoint || '').replace(/"/g, '&quot;')}" onchange="updatePersonField('${name.replace(/'/g, "\\'")}','meetPoint',this.value)" />
          <input placeholder="Notas" value="${(p.notas || '').replace(/"/g, '&quot;')}" onchange="updatePersonField('${name.replace(/'/g, "\\'")}','notas',this.value)" />
        </div>
        <div class="person-two-col">
          <div>
            <h3>Tiene para intercambiar (${haveCount})</h3>
            <div class="team-picker">
              <div class="team-picker-row">
                <select class="team-select" onchange="pickerPersonHave['${escName}']=this.value; renderDbPersonas();">${teamOptionsHtml(pickerPersonHave[name])}</select>
                <input type="number" class="qty" id="havePickQty-${cid}" min="1" value="1" placeholder="Cant." />
              </div>
              ${numberGridHtml(pickerPersonHave[name], new Set(Object.keys(p.have[pickerPersonHave[name]] || {}).map(Number)), n => `togglePersonHaveNum('${escName}','${pickerPersonHave[name]}',${n})`)}
              ${collapseButtonHtml(pickerPersonHave[name], `collapsePersonHavePicker('${escName}')`)}
            </div>
            <div class="db-list" id="haveList-${cid}">${haveRows.length ? haveRows.map(r => {
              const received = personReceivedCount(name, stickerDisplay(r.code, r.num));
              const note = received > 0 ? ` <span class="db-live-note">✅ Ya te lo dio</span>` : '';
              return `<div class="db-row"><span class="code">${stickerDisplay(r.code, r.num)}</span><span class="label">${categoryLabelOf(r.code, r.num)} ${r.qty > 1 ? `x${r.qty}` : ''}${note}</span><button class="del" onclick="removePersonHave('${escName}','${r.code}',${r.num})">✕</button></div>`;
            }).join('') : '<div class="db-empty">Sin datos</div>'}</div>
          </div>
          <div>
            <h3>Necesita (${needCount})</h3>
            <div class="team-picker">
              <div class="team-picker-row">
                <select class="team-select" onchange="pickerPersonNeed['${escName}']=this.value; renderDbPersonas();">${teamOptionsHtml(pickerPersonNeed[name])}</select>
              </div>
              ${numberGridHtml(pickerPersonNeed[name], new Set(p.need[pickerPersonNeed[name]] || []), n => `togglePersonNeedNum('${escName}','${pickerPersonNeed[name]}',${n})`)}
              ${collapseButtonHtml(pickerPersonNeed[name], `collapsePersonNeedPicker('${escName}')`)}
            </div>
            <div class="db-list" id="needList-${cid}">${needRows.length ? needRows.map(r => {
              const given = personGivenCount(name, stickerDisplay(r.code, r.num));
              const note = given > 0 ? ` <span class="db-live-note">✅ Ya se lo diste</span>` : '';
              return `<div class="db-row"><span class="code">${stickerDisplay(r.code, r.num)}</span><span class="label">${categoryLabelOf(r.code, r.num)}${note}</span><button class="del" onclick="removePersonNeed('${escName}','${r.code}',${r.num})">✕</button></div>`;
            }).join('') : '<div class="db-empty">Sin datos</div>'}</div>
          </div>
        </div>
      </div>
    </div>`;
  }
  el.innerHTML = html;
}

// ============================================================================
// RENDER — BASE DE DATOS: VENTAS
// ============================================================================
function createSaleBuyer() {
  const name = document.getElementById('newBuyerName').value.trim();
  const location = document.getElementById('newBuyerLocation').value.trim();
  if (!name) { alert('Escribe un nombre'); return; }
  if (state.sales.find(s => s.buyer === name)) { alert('Ya existe ese comprador'); return; }
  state.sales.push({ buyer: name, location, meetPoint: location, need: {}, precioAlto: [] });
  document.getElementById('newBuyerName').value = '';
  document.getElementById('newBuyerLocation').value = '';
  saveDbState();
  renderAll();
}
function removeSaleBuyer(name) {
  if (!confirm(`¿Eliminar comprador ${name}?`)) return;
  state.sales = state.sales.filter(s => s.buyer !== name);
  saveDbState();
  renderAll();
}
function toggleSaleNeedNum(buyer, code, num) {
  const sale = state.sales.find(s => s.buyer === buyer);
  if (!sale.need[code]) sale.need[code] = [];
  const idx = sale.need[code].indexOf(num);
  if (idx >= 0) {
    sale.need[code].splice(idx, 1);
    if (sale.need[code].length === 0) delete sale.need[code];
  } else {
    sale.need[code].push(num);
  }
  saveDbState();
  renderAll();
}

// Los datos ya se guardan al tocar cada número; "Guardar" solo colapsa el
// picker de vuelta al selector, para no dejar la grilla abierta todo el tiempo.
function collapseTengoPicker() { pickerTengo = ''; renderDbInventario(); }
function collapseNecesitoPicker() { pickerNecesito = ''; renderDbInventario(); }
function collapsePersonHavePicker(name) { delete pickerPersonHave[name]; renderDbPersonas(); }
function collapsePersonNeedPicker(name) { delete pickerPersonNeed[name]; renderDbPersonas(); }
function collapseSaleNeedPicker(buyer) { delete pickerSaleNeed[buyer]; renderDbVentas(); }

function removeSaleNeed(buyer, code, num) {
  const sale = state.sales.find(s => s.buyer === buyer);
  sale.need[code] = sale.need[code].filter(n => n !== num);
  if (sale.need[code].length === 0) delete sale.need[code];
  saveDbState();
  renderAll();
}
function toggleSaleAltoPrice(buyer, code, num) {
  const sale = state.sales.find(s => s.buyer === buyer);
  const idx = (sale.precioAlto || []).findIndex(([c, n]) => c === code && n === num);
  if (!sale.precioAlto) sale.precioAlto = [];
  if (idx >= 0) sale.precioAlto.splice(idx, 1); else sale.precioAlto.push([code, num]);
  saveDbState();
  renderAll();
}

function renderDbVentas() {
  const el = document.getElementById('db-ventas');
  if (!el) return;
  const { totalSales, doneSales } = computeSummary();
  let html = `<div class="summary-bar" style="margin-bottom:16px">
    <div class="pill" style="background:var(--pitch);color:var(--paper)">$ <b>${doneSales}</b>/${totalSales} ventas hechas</div>
  </div>
  <div class="db-section">
    <p class="db-sub">Personas que ya no tienen nada para intercambiar y sólo quieren COMPRAR stickers tuyos.</p>
    <div class="new-person-form">
      <input id="newBuyerName" placeholder="Nombre del comprador" />
      <input id="newBuyerLocation" placeholder="Ubicación (opcional)" />
      <button onclick="createSaleBuyer()">+ Nuevo Comprador</button>
    </div>
  </div>`;

  if (state.sales.length === 0) html += '<div class="db-empty">Sin compradores todavía.</div>';

  for (const sale of state.sales) {
    const escBuyer = sale.buyer.replace(/'/g, "\\'");
    const buyerKey = `Venta::${sale.buyer}`;
    let needRows = [];
    for (const code in sale.need) for (const num of sale.need[code]) needRows.push({ code, num });
    needRows.sort((a, b) => (a.code + a.num).localeCompare(b.code + b.num));
    const matches = computeSaleMatches(sale.buyer);
    const doneCount = matches.filter(item => checked.has(`${sale.buyer}::sale::${stickerDisplay(item.code, item.num)}`)).length;

    const meet = meetInfo[buyerKey] || {};
    const meetPlace = meet.place !== undefined ? meet.place : sale.location;
    const meetDate = meet.date || '';
    const meetTime = meet.time || '';

    html += `<div class="person-manage-card">
      <div class="person-manage-head">
        <div class="info"><div class="name">${sale.buyer}</div><div class="count">${sale.location || '(sin ubicación)'} · ${doneCount}/${matches.length} vendidos</div></div>
        <div class="person-manage-actions"><button class="del" onclick="removeSaleBuyer('${escBuyer}')">Eliminar</button></div>
      </div>
      <div class="person-manage-body open">
        <div class="meet-edit-row" style="margin-bottom:14px">
          <div class="meet-field" style="color:var(--ink)"><label style="color:var(--muted)">Fecha</label><input type="date" style="background:#fff;border-color:var(--paper-line);color:var(--ink)" data-person="${buyerKey}" value="${meetDate}" onchange="updateMeet(this,'date')" />${!meetDate ? '<span class="meet-undefined">Sin definir</span>' : ''}</div>
          <div class="meet-field" style="color:var(--ink)"><label style="color:var(--muted)">Hora</label><input type="time" style="background:#fff;border-color:var(--paper-line);color:var(--ink)" data-person="${buyerKey}" value="${meetTime}" onchange="updateMeet(this,'time')" /></div>
          <div class="meet-field place" style="color:var(--ink)"><label style="color:var(--muted)">Lugar</label><input type="text" style="background:#fff;border-color:var(--paper-line);color:var(--ink)" placeholder="Lugar de encuentro" data-person="${buyerKey}" value="${(meetPlace || '').replace(/"/g, '&quot;')}" onchange="updateMeet(this,'place')" /></div>
        </div>
        ${matches.length ? `<h3 style="font-family:'Barlow Condensed',sans-serif;font-size:15px;margin:0 0 6px;color:var(--pitch-dark)">Disponibles para vender ahora (${doneCount}/${matches.length})</h3>
        <div class="db-list" id="saleMatchesList-${cssId(sale.buyer)}" style="margin-bottom:14px">${matches.map(item => renderSaleRow(sale.buyer, item)).join('')}</div>` : ''}
        <div class="team-picker">
          <div class="team-picker-row">
            <select class="team-select" onchange="pickerSaleNeed['${escBuyer}']=this.value; renderDbVentas();">${teamOptionsHtml(pickerSaleNeed[sale.buyer])}</select>
          </div>
          ${numberGridHtml(pickerSaleNeed[sale.buyer], new Set(sale.need[pickerSaleNeed[sale.buyer]] || []), n => `toggleSaleNeedNum('${escBuyer}','${pickerSaleNeed[sale.buyer]}',${n})`)}
          ${collapseButtonHtml(pickerSaleNeed[sale.buyer], `collapseSaleNeedPicker('${escBuyer}')`)}
        </div>
        <div class="db-list" id="saleNeedList-${cssId(sale.buyer)}">${needRows.length ? needRows.map(r => {
          const isAlto = (sale.precioAlto || []).some(([c, n]) => c === r.code && n === r.num);
          const has = tengoQty(r.code, r.num) > 0;
          return `<div class="db-row">
            <span class="code">${stickerDisplay(r.code, r.num)}</span>
            <span class="label">${categoryLabelOf(r.code, r.num)} ${has ? '✅ lo tienes' : '— no lo tienes'}</span>
            <label style="font-size:10.5px;display:flex;align-items:center;gap:3px;"><input type="checkbox" ${isAlto ? 'checked' : ''} onchange="toggleSaleAltoPrice('${sale.buyer.replace(/'/g, "\\'")}','${r.code}',${r.num})" /> Precio alto</label>
            <button class="del" onclick="removeSaleNeed('${sale.buyer.replace(/'/g, "\\'")}','${r.code}',${r.num})">✕</button>
          </div>`;
        }).join('') : '<div class="db-empty">Sin datos</div>'}</div>
      </div>
    </div>`;
  }
  el.innerHTML = html;
}

// ============================================================================
// INIT
// ============================================================================
document.getElementById('resetBtn').addEventListener('click', async () => {
  if (confirm('¿Reiniciar todo el progreso de intercambios? Esto desmarca todo, deshace los ajustes de valor y borra fecha/lugar/hora. NO borra tu base de datos (Tengo/Necesito/Personas).')) {
    checked = new Set();
    valueOverrides = {};
    meetInfo = {};
    await saveTrackingState();
    renderAll();
  }
});

loadAll();

</script>
